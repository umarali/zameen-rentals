<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZameenRentals — Find Rentals in Karachi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#0a8f3c;--green-dark:#067a2f;--green-light:#e8f5e9;--green-50:#f1f8f3;--gray-50:#f8f9fa;--gray-100:#f1f3f5;--gray-200:#e9ecef;--gray-300:#dee2e6;--gray-400:#adb5bd;--gray-500:#868e96;--gray-600:#495057;--gray-700:#343a40;--gray-800:#212529;--radius:12px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.1),0 8px 32px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.12),0 16px 48px rgba(0,0,0,.08)}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--gray-50);color:var(--gray-800);line-height:1.5;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(135deg,#0a8f3c 0%,#06712e 50%,#044d1f 100%);color:#fff;padding:20px 16px 24px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 60%);pointer-events:none}
.header h1{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;position:relative}
.header p{font-size:13px;opacity:.85;font-weight:400;position:relative}
.container{max-width:600px;margin:0 auto;padding:0 12px}
.search-panel{background:#fff;border-radius:0 0 var(--radius) var(--radius);margin:-8px 12px 16px;padding:16px;box-shadow:var(--shadow-md);position:relative;z-index:2}
.quick-chips{display:flex;gap:8px;overflow-x:auto;padding:0 0 12px;scrollbar-width:none;-ms-overflow-style:none}
.quick-chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--gray-200);background:#fff;font-size:13px;font-weight:500;color:var(--gray-600);cursor:pointer;transition:all .2s;white-space:nowrap}
.chip:hover,.chip.active{background:var(--green-light);border-color:var(--green);color:var(--green)}
.form-row{display:grid;gap:10px;margin-bottom:12px}
.form-row.two{grid-template-columns:1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px}
.form-group select,.form-group input{padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--gray-700);background:#fff;transition:border-color .2s;outline:none;width:100%}
.form-group select:focus,.form-group input:focus{border-color:var(--green)}
.bed-pills{display:flex;gap:6px;flex-wrap:wrap}
.bed-pill{padding:8px 14px;border-radius:20px;border:1.5px solid var(--gray-200);background:#fff;font-size:13px;font-weight:500;color:var(--gray-600);cursor:pointer;transition:all .2s}
.bed-pill:hover,.bed-pill.active{background:var(--green);border-color:var(--green);color:#fff}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.toggle-row span{font-size:13px;font-weight:500;color:var(--gray-600)}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--gray-300);position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}
.search-btn{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .15s,box-shadow .15s;margin-top:4px}
.search-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(10,143,60,.35)}
.search-btn:active{transform:translateY(0)}
.search-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.results-header{padding:16px 0 8px;display:flex;justify-content:space-between;align-items:center}
.results-header h2{font-size:16px;font-weight:700;color:var(--gray-700)}
.results-header span{font-size:13px;color:var(--gray-500)}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;transition:transform .2s,box-shadow .2s;animation:fadeUp .4s ease both}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-body{padding:14px 16px}
.card-title{font-size:15px;font-weight:600;color:var(--gray-800);line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-price{font-size:22px;font-weight:800;color:var(--green);margin-bottom:8px}
.card-location{font-size:13px;color:var(--gray-500);margin-bottom:10px;display:flex;align-items:center;gap:4px}
.card-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;background:var(--gray-100);font-size:12px;font-weight:500;color:var(--gray-600)}
.card-link{display:inline-block;padding:8px 16px;border-radius:var(--radius-sm);background:var(--green-light);color:var(--green);font-size:13px;font-weight:600;text-decoration:none;transition:background .2s}
.card-link:hover{background:#d4edda}
.spinner{display:flex;flex-direction:column;align-items:center;gap:12px;padding:48px 0}
.spinner-ring{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner p{font-size:14px;color:var(--gray-500)}
.empty-state{text-align:center;padding:48px 20px}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:17px;font-weight:600;color:var(--gray-700);margin-bottom:6px}
.empty-state p{font-size:14px;color:var(--gray-500)}
.error-state{text-align:center;padding:32px 20px;background:#fff4f4;border-radius:var(--radius);margin:16px 0}
.error-state p{color:#c92a2a;font-size:14px;font-weight:500}
.load-more{width:100%;padding:12px;border:2px solid var(--green);border-radius:var(--radius-sm);background:#fff;color:var(--green);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin:8px 0 24px;transition:all .2s}
.load-more:hover{background:var(--green-light)}
.footer{text-align:center;padding:24px 16px 32px;font-size:12px;color:var(--gray-400)}
.footer a{color:var(--gray-500);text-decoration:none}
.section-label{font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:4px}
.divider{height:1px;background:var(--gray-200);margin:12px 0}
</style>
</head>
<body>

<div class="header">
  <h1>ZameenRentals</h1>
  <p>Find your perfect rental in Karachi</p>
</div>

<div class="container">
  <div class="search-panel">
    <div class="quick-chips" id="quickChips">
      <div class="chip" data-area="DHA Phase 5">DHA Ph 5</div>
      <div class="chip" data-area="Clifton">Clifton</div>
      <div class="chip" data-area="Gulshan-e-Iqbal">Gulshan</div>
      <div class="chip" data-area="PECHS">PECHS</div>
      <div class="chip" data-area="Bahria Town Karachi">Bahria Town</div>
      <div class="chip" data-area="DHA Phase 6">DHA Ph 6</div>
      <div class="chip" data-area="North Nazimabad">N. Nazimabad</div>
      <div class="chip" data-area="Nazimabad">Nazimabad</div>
    </div>

    <div class="form-row two">
      <div class="form-group">
        <label>Area</label>
        <select id="areaSelect"><option value="">All Karachi</option></select>
      </div>
      <div class="form-group">
        <label>Property Type</label>
        <select id="typeSelect"><option value="">Any Type</option></select>
      </div>
    </div>

    <div class="section-label">Bedrooms</div>
    <div class="bed-pills" id="bedPills">
      <div class="bed-pill active" data-beds="">Any</div>
      <div class="bed-pill" data-beds="1">1</div>
      <div class="bed-pill" data-beds="2">2</div>
      <div class="bed-pill" data-beds="3">3</div>
      <div class="bed-pill" data-beds="4">4</div>
      <div class="bed-pill" data-beds="5">5+</div>
    </div>

    <div class="divider"></div>

    <div class="form-row two">
      <div class="form-group">
        <label>Min Price (PKR)</label>
        <input type="number" id="priceMin" placeholder="e.g. 20000" min="0">
      </div>
      <div class="form-group">
        <label>Max Price (PKR)</label>
        <input type="number" id="priceMax" placeholder="e.g. 100000" min="0">
      </div>
    </div>

    <div class="form-row two">
      <div class="toggle-row">
        <span>Furnished Only</span>
        <div class="toggle" id="furnishedToggle"></div>
      </div>
      <div class="form-group">
        <label>Sort By</label>
        <select id="sortSelect">
          <option value="">Relevance</option>
          <option value="price_low">Price: Low to High</option>
          <option value="price_high">Price: High to Low</option>
          <option value="newest">Newest First</option>
        </select>
      </div>
    </div>

    <button class="search-btn" id="searchBtn">Search Rentals</button>
  </div>

  <div id="resultsArea"></div>
</div>

<div class="footer">
  Powered by Zameen.com data &middot; Built with ZameenRentals
</div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);

  let currentPage = 1;
  let isLoading = false;
  let currentResults = [];
  let selectedBeds = '';
  let furnished = false;

  // Load areas & types
  async function loadFilters() {
    try {
      const [areas, types] = await Promise.all([
        fetch('/api/areas').then(r => r.json()),
        fetch('/api/property-types').then(r => r.json())
      ]);
      const areaSelect = $('#areaSelect');
      areas.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.name;
        opt.textContent = a.name;
        areaSelect.appendChild(opt);
      });
      const typeSelect = $('#typeSelect');
      types.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.key;
        opt.textContent = t.label;
        typeSelect.appendChild(opt);
      });
    } catch(e) { console.error('Failed to load filters:', e); }
  }

  // Quick chips
  $('#quickChips').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    $$('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    $('#areaSelect').value = chip.dataset.area;
    doSearch();
  });

  // Bed pills
  $('#bedPills').addEventListener('click', e => {
    const pill = e.target.closest('.bed-pill');
    if (!pill) return;
    $$('.bed-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    selectedBeds = pill.dataset.beds;
  });

  // Furnished toggle
  $('#furnishedToggle').addEventListener('click', function() {
    furnished = !furnished;
    this.classList.toggle('on', furnished);
  });

  // Search button
  $('#searchBtn').addEventListener('click', () => doSearch());

  // Enter key on inputs
  $$('input').forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); }));

  function getParams(page) {
    const params = new URLSearchParams();
    const area = $('#areaSelect').value;
    const type = $('#typeSelect').value;
    const pMin = $('#priceMin').value;
    const pMax = $('#priceMax').value;
    const sort = $('#sortSelect').value;
    if (area) params.set('area', area);
    if (type) params.set('property_type', type);
    if (selectedBeds) params.set('bedrooms', selectedBeds);
    if (pMin) params.set('price_min', pMin);
    if (pMax) params.set('price_max', pMax);
    if (furnished) params.set('furnished', 'true');
    if (sort) params.set('sort', sort);
    params.set('page', page);
    return params;
  }

  function saveSearch() {
    try {
      const data = {
        area: $('#areaSelect').value,
        type: $('#typeSelect').value,
        beds: selectedBeds,
        priceMin: $('#priceMin').value,
        priceMax: $('#priceMax').value,
        furnished,
        sort: $('#sortSelect').value
      };
      localStorage.setItem('rk_last_search', JSON.stringify(data));
    } catch(e) {}
  }

  function loadLastSearch() {
    try {
      const data = JSON.parse(localStorage.getItem('rk_last_search'));
      if (!data) return;
      if (data.area) $('#areaSelect').value = data.area;
      if (data.type) $('#typeSelect').value = data.type;
      if (data.beds) {
        selectedBeds = data.beds;
        $$('.bed-pill').forEach(p => {
          p.classList.toggle('active', p.dataset.beds === data.beds);
        });
      }
      if (data.priceMin) $('#priceMin').value = data.priceMin;
      if (data.priceMax) $('#priceMax').value = data.priceMax;
      if (data.furnished) { furnished = true; $('#furnishedToggle').classList.add('on'); }
      if (data.sort) $('#sortSelect').value = data.sort;
    } catch(e) {}
  }

  function formatPrice(price, priceText) {
    if (priceText) return priceText;
    if (!price) return 'Price on request';
    if (price >= 10000000) return 'Rs ' + (price / 10000000).toFixed(1) + ' Crore';
    if (price >= 100000) return 'Rs ' + (price / 100000).toFixed(1) + ' Lakh';
    if (price >= 1000) return 'Rs ' + (price / 1000).toFixed(0) + 'K';
    return 'Rs ' + price.toLocaleString();
  }

  function renderCard(item, idx) {
    const delay = Math.min(idx * 60, 400);
    const badges = [];
    if (item.bedrooms) badges.push(`<span class="badge">&#x1f6cf;&#xfe0f; ${item.bedrooms} Bed${item.bedrooms>1?'s':''}</span>`);
    if (item.bathrooms) badges.push(`<span class="badge">&#x1f6bf; ${item.bathrooms} Bath${item.bathrooms>1?'s':''}</span>`);
    if (item.area_size) badges.push(`<span class="badge">&#x1f4d0; ${item.area_size}</span>`);

    return `<div class="card" style="animation-delay:${delay}ms">
      <div class="card-body">
        <div class="card-title">${escHtml(item.title || 'Rental Property')}</div>
        <div class="card-price">${escHtml(formatPrice(item.price, item.price_text))}</div>
        ${item.location ? `<div class="card-location">&#x1f4cd; ${escHtml(item.location)}</div>` : ''}
        ${badges.length ? `<div class="card-badges">${badges.join('')}</div>` : ''}
        ${item.added ? `<div style="font-size:12px;color:var(--gray-400);margin-bottom:10px">${escHtml(item.added)}</div>` : ''}
        ${item.url ? `<a class="card-link" href="${escAttr(item.url)}" target="_blank" rel="noopener">View on Zameen &rarr;</a>` : ''}
      </div>
    </div>`;
  }

  function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function escAttr(s) { return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

  function showLoading(append) {
    const area = $('#resultsArea');
    if (!append) area.innerHTML = '';
    const spinner = document.createElement('div');
    spinner.className = 'spinner';
    spinner.id = 'loadingSpinner';
    spinner.innerHTML = '<div class="spinner-ring"></div><p>Searching Zameen.com...</p>';
    area.appendChild(spinner);
  }

  function hideLoading() {
    const sp = $('#loadingSpinner');
    if (sp) sp.remove();
  }

  function showEmpty() {
    $('#resultsArea').innerHTML = `<div class="empty-state">
      <div class="icon">&#x1f3e0;</div>
      <h3>No rentals found</h3>
      <p>Try adjusting your filters or searching a different area</p>
    </div>`;
  }

  function showError(msg) {
    hideLoading();
    const area = $('#resultsArea');
    const err = document.createElement('div');
    err.className = 'error-state';
    err.innerHTML = `<p>&#x26a0;&#xfe0f; ${escHtml(msg)}</p>`;
    area.appendChild(err);
  }

  async function doSearch(page) {
    if (isLoading) return;
    const append = page && page > 1;
    if (!append) { currentPage = 1; currentResults = []; }
    else currentPage = page;

    isLoading = true;
    $('#searchBtn').disabled = true;
    showLoading(append);
    saveSearch();

    // Remove active chip if area doesn't match
    const areaVal = $('#areaSelect').value;
    $$('.chip').forEach(c => c.classList.toggle('active', c.dataset.area === areaVal));

    try {
      const params = getParams(currentPage);
      const resp = await fetch('/api/search?' + params.toString());
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: 'Search failed' }));
        throw new Error(err.detail || 'Search failed');
      }
      const data = await resp.json();
      hideLoading();

      if (!append) {
        currentResults = data.results || [];
        const area = $('#resultsArea');
        if (currentResults.length === 0) { showEmpty(); return; }
        area.innerHTML = `<div class="results-header">
          <h2>Rentals Found</h2>
          <span>${data.total || currentResults.length} results</span>
        </div>`;
        currentResults.forEach((item, i) => area.insertAdjacentHTML('beforeend', renderCard(item, i)));
      } else {
        const newResults = data.results || [];
        currentResults = currentResults.concat(newResults);
        const area = $('#resultsArea');
        const oldBtn = area.querySelector('.load-more');
        if (oldBtn) oldBtn.remove();
        newResults.forEach((item, i) => area.insertAdjacentHTML('beforeend', renderCard(item, i)));
      }

      // Load more button
      if ((data.results || []).length >= 15) {
        const btn = document.createElement('button');
        btn.className = 'load-more';
        btn.textContent = 'Load More Results';
        btn.addEventListener('click', () => doSearch(currentPage + 1));
        $('#resultsArea').appendChild(btn);
      }

    } catch(e) {
      showError(e.message || 'Something went wrong. Please try again.');
    } finally {
      isLoading = false;
      $('#searchBtn').disabled = false;
    }
  }

  // Init
  loadFilters().then(() => {
    loadLastSearch();
  });
})();
</script>
</body>
</html>
