<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OG Preview — local mock</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    margin: 0; padding: 32px 20px 64px; background: #f3f4f6; color: #111827;
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-size: 22px; margin: 0 0 6px; }
  p.lead { color: #6b7280; margin: 0 0 28px; font-size: 14px; }
  .url { display: inline-block; padding: 4px 10px; background: #e5e7eb; border-radius: 6px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }
  .grid { display: grid; gap: 28px; max-width: 1100px; margin: 0 auto; }
  @media (min-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } }
  .card-wrap { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 1px 2px rgba(0,0,0,.05), 0 4px 14px rgba(0,0,0,.06); }
  .card-wrap h2 { font-size: 13px; font-weight: 600; color: #6b7280; margin: 0 0 12px; text-transform: uppercase; letter-spacing: .04em; }

  /* SLACK */
  .slack { display: flex; gap: 10px; align-items: stretch; padding-left: 12px; border-left: 4px solid #d1d5db; }
  .slack .body { flex: 1; min-width: 0; }
  .slack .site { font-size: 13px; color: #6b7280; margin-bottom: 4px; }
  .slack .title { font-size: 15px; font-weight: 600; color: #1d4ed8; margin-bottom: 4px; line-height: 1.3; }
  .slack .desc { font-size: 14px; color: #374151; line-height: 1.45; margin-bottom: 8px; }
  .slack img { width: 100%; border-radius: 6px; max-height: 280px; object-fit: cover; }

  /* TWITTER / X */
  .twitter { border: 1px solid #cfd9de; border-radius: 16px; overflow: hidden; }
  .twitter img { width: 100%; display: block; aspect-ratio: 1200/630; object-fit: cover; }
  .twitter .meta { padding: 10px 14px; border-top: 1px solid #cfd9de; }
  .twitter .url-line { font-size: 13px; color: #536471; }
  .twitter .title { font-size: 15px; color: #0f1419; margin: 2px 0 2px; line-height: 1.3; max-height: 1.3em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .twitter .desc { font-size: 13px; color: #536471; line-height: 1.4; max-height: 2.8em; overflow: hidden; }

  /* iMESSAGE */
  .imessage-bubble { max-width: 360px; margin: 0 auto; }
  .imessage { background: #e9e9eb; border-radius: 18px; overflow: hidden; }
  .imessage img { width: 100%; aspect-ratio: 1200/630; object-fit: cover; display: block; }
  .imessage .meta { padding: 10px 14px; }
  .imessage .title { font-size: 14px; font-weight: 600; color: #000; line-height: 1.3; }
  .imessage .desc { font-size: 13px; color: #3c3c4399; line-height: 1.4; margin-top: 2px; max-height: 2.8em; overflow: hidden; }
  .imessage .host { font-size: 12px; color: #3c3c4399; margin-top: 6px; }

  /* WHATSAPP */
  .whatsapp { max-width: 380px; margin: 0 auto; background: #d9fdd3; border-radius: 8px 8px 12px 12px; padding: 6px; }
  .whatsapp-card { background: rgba(255,255,255,.55); border-radius: 6px; overflow: hidden; }
  .whatsapp img { width: 100%; aspect-ratio: 1200/630; object-fit: cover; display: block; }
  .whatsapp .meta { padding: 8px 10px; }
  .whatsapp .title { font-size: 13.5px; font-weight: 500; color: #111b21; line-height: 1.3; }
  .whatsapp .desc { font-size: 12.5px; color: #667781; line-height: 1.35; margin-top: 2px; max-height: 2.7em; overflow: hidden; }
  .whatsapp .host { font-size: 11px; color: #667781; margin-top: 4px; text-transform: lowercase; }

  /* DEBUG */
  .debug { background: #fff; border-radius: 14px; padding: 18px; max-width: 1100px; margin: 28px auto 0; box-shadow: 0 1px 2px rgba(0,0,0,.05); }
  .debug h2 { font-size: 13px; font-weight: 600; color: #6b7280; margin: 0 0 10px; text-transform: uppercase; letter-spacing: .04em; }
  .debug table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .debug td { padding: 6px 10px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
  .debug td:first-child { font-family: ui-monospace, "SF Mono", Menlo, monospace; color: #4b5563; white-space: nowrap; width: 1%; }
  .debug td:last-child { color: #111827; word-break: break-word; }
  .warn { background: #fef3c7; color: #78350f; padding: 10px 14px; border-radius: 8px; font-size: 13px; max-width: 1100px; margin: 0 auto 20px; }
</style>
</head>
<body>
  <h1>Link share preview — local mock</h1>
  <p class="lead">
    Renders how the unfurl looks across major platforms using the meta tags served at
    <span class="url" id="srcUrl">/</span>. Refresh after editing index.html or og-card.png.
  </p>
  <div id="warn" class="warn" hidden></div>

  <div class="grid">
    <div class="card-wrap">
      <h2>Slack / Discord</h2>
      <div class="slack">
        <div class="body">
          <div class="site" id="slack-site"></div>
          <div class="title" id="slack-title"></div>
          <div class="desc" id="slack-desc"></div>
          <img id="slack-img" alt="">
        </div>
      </div>
    </div>

    <div class="card-wrap">
      <h2>Twitter / X (summary_large_image)</h2>
      <div class="twitter">
        <img id="twitter-img" alt="">
        <div class="meta">
          <div class="url-line" id="twitter-host"></div>
          <div class="title" id="twitter-title"></div>
          <div class="desc" id="twitter-desc"></div>
        </div>
      </div>
    </div>

    <div class="card-wrap">
      <h2>iMessage (link bubble)</h2>
      <div class="imessage-bubble">
        <div class="imessage">
          <img id="im-img" alt="">
          <div class="meta">
            <div class="title" id="im-title"></div>
            <div class="desc" id="im-desc"></div>
            <div class="host" id="im-host"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card-wrap">
      <h2>WhatsApp</h2>
      <div class="whatsapp">
        <div class="whatsapp-card">
          <img id="wa-img" alt="">
          <div class="meta">
            <div class="title" id="wa-title"></div>
            <div class="desc" id="wa-desc"></div>
            <div class="host" id="wa-host"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="debug">
    <h2>Raw meta tags (parsed)</h2>
    <table id="debug-table"><tbody></tbody></table>
  </div>

<script>
(async function () {
  const SRC = '/';
  document.getElementById('srcUrl').textContent = SRC;

  const html = await fetch(SRC, { cache: 'no-store' }).then(r => r.text());
  const doc = new DOMParser().parseFromString(html, 'text/html');

  const meta = (sel) => {
    const el = doc.querySelector(sel);
    return el ? (el.getAttribute('content') || '') : '';
  };
  const m = {
    title: meta('meta[property="og:title"]') || (doc.querySelector('title')?.textContent || ''),
    description: meta('meta[property="og:description"]') || meta('meta[name="description"]'),
    image: meta('meta[property="og:image"]'),
    site_name: meta('meta[property="og:site_name"]'),
    url: meta('meta[property="og:url"]'),
    twTitle: meta('meta[name="twitter:title"]') || meta('meta[property="og:title"]'),
    twDesc: meta('meta[name="twitter:description"]') || meta('meta[property="og:description"]'),
    twImage: meta('meta[name="twitter:image"]') || meta('meta[property="og:image"]'),
  };

  // Map production absolute URLs back to local for img preview
  const localize = (u) => {
    if (!u) return u;
    try {
      const parsed = new URL(u, location.href);
      // If host differs from current host, swap to local for the image fetch
      if (parsed.host !== location.host) {
        return parsed.pathname + parsed.search + parsed.hash;
      }
      return u;
    } catch { return u; }
  };

  const localImg = localize(m.image);
  const localTwImg = localize(m.twImage);

  // Warn if image URL had to be remapped
  if (m.image && localImg !== m.image) {
    const w = document.getElementById('warn');
    w.hidden = false;
    w.textContent = 'Note: og:image points at production (' + m.image + '). Showing the local copy at ' + localImg + ' for the preview.';
  }

  const hostFromUrl = (u) => { try { return new URL(u).host; } catch { return u; } };
  const host = hostFromUrl(m.url) || location.host;

  // SLACK
  document.getElementById('slack-site').textContent = m.site_name || host;
  document.getElementById('slack-title').textContent = m.title;
  document.getElementById('slack-desc').textContent = m.description;
  document.getElementById('slack-img').src = localImg;

  // TWITTER
  document.getElementById('twitter-host').textContent = host;
  document.getElementById('twitter-title').textContent = m.twTitle;
  document.getElementById('twitter-desc').textContent = m.twDesc;
  document.getElementById('twitter-img').src = localTwImg;

  // iMessage
  document.getElementById('im-img').src = localImg;
  document.getElementById('im-title').textContent = m.title;
  document.getElementById('im-desc').textContent = m.description;
  document.getElementById('im-host').textContent = host;

  // WhatsApp
  document.getElementById('wa-img').src = localImg;
  document.getElementById('wa-title').textContent = m.title;
  document.getElementById('wa-desc').textContent = m.description;
  document.getElementById('wa-host').textContent = host;

  // DEBUG
  const tbody = document.querySelector('#debug-table tbody');
  const rows = [
    ['<title>', doc.querySelector('title')?.textContent || ''],
    ['description', meta('meta[name="description"]')],
    ['og:type', meta('meta[property="og:type"]')],
    ['og:site_name', m.site_name],
    ['og:title', meta('meta[property="og:title"]')],
    ['og:description', meta('meta[property="og:description"]')],
    ['og:url', m.url],
    ['og:locale', meta('meta[property="og:locale"]')],
    ['og:image', m.image],
    ['og:image:width', meta('meta[property="og:image:width"]')],
    ['og:image:height', meta('meta[property="og:image:height"]')],
    ['og:image:alt', meta('meta[property="og:image:alt"]')],
    ['twitter:card', meta('meta[name="twitter:card"]')],
    ['twitter:title', m.twTitle],
    ['twitter:description', m.twDesc],
    ['twitter:image', m.twImage],
  ];
  tbody.innerHTML = rows.map(([k, v]) =>
    `<tr><td>${k}</td><td>${v ? v.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])) : '<i style="color:#9ca3af">empty</i>'}</td></tr>`
  ).join('');
})();
</script>
</body>
</html>
